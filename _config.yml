title: Singelas Referências
tagline: Registro escrito de coisa ouvida, vista, lida ou pensada
author: Winicius B. Faquieri
email: wfaquieri@gmail.com
lang: pt-BR

# Domínio próprio. Este par tem que casar com o arquivo CNAME da raiz: se um
# mudar e o outro não, todo link e todo CSS do site quebram de uma vez.
url: "https://singelasreferencias.com.br"
baseurl: ""

permalink: /:year/:month/:title/

markdown: kramdown
kramdown:
  footnote_backlink: "↩"
  smart_quotes: ["apos", "apos", "ldquo", "rdquo"]

plugins:
  - jekyll-feed

feed:
  path: feed.xml

meses:
  - janeiro
  - fevereiro
  - março
  - abril
  - maio
  - junho
  - julho
  - agosto
  - setembro
  - outubro
  - novembro
  - dezembro

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
