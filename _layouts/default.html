<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#171614">
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.tagline }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.tagline }}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
{% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}">{% endif %}
<meta name="twitter:card" content="{% if page.image %}summary_large_image{% else %}summary{% endif %}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>

<header class="site-header">
  <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
  <p class="site-tagline">{{ site.tagline }}</p>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}">Textos</a>
    <a href="{{ '/sobre/' | relative_url }}">Sobre</a>
  </nav>
</header>

<main>
{{ content }}
</main>

<footer class="site-footer">
  <p>{{ site.author }} · <a href="{{ '/feed.xml' | relative_url }}">RSS</a></p>
</footer>

</body>
</html>
